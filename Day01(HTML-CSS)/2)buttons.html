<!DOCTYPE html>
<html>
  <head>
    <title>Buttons</title>
  </head>
  <style>
    .subscribe-button {
      background-color : rgb(205, 10, 0);
      color : white;
      border : none;
      height : 36px;
      weight : 105px;
      border-radius : 5px;
      cursor : pointer;
      margin : 8px;
    }

    .join-button {
      background-color : rgb(255, 255, 255);
      border-color : rgb(11, 11, 177);
      border-style : solid;
      border-width : 1px;
      color :rgb(42, 42, 175);
      height : 36px;
      width : 62px;
      border-radius : 5px;
      cursor : pointer;
      margin : 8px;
      font-weight : bold;
    }

    .tweet-button {
      background-color : rgb(74, 74, 220);
      color : white;
      border : none;
      height : 36px;
      width : 78px;
      cursor : pointer;
      margin : 8px;
      border-radius : 18px;
      font-size : 13px;
      font-weight : bold;
    }

  </style>
  
  <body>
    <button class = "subscribe-button">SUBSCRIBE</button>
    <button class = "join-button">JOIN</button>
    <button class = "tweet-button">TWEET</button>
  </body>
</html>
